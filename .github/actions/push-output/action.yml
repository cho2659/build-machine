name: "Push build output to repo"
description: >
  전달받은 경로(glob 가능)를 git add/commit/push 한다. 여러 matrix job이
  동시에 같은 브랜치로 push할 수 있어 rejection 시 fetch+rebase 후
  재시도한다. 경로가 하나도 존재하지 않으면(=빌드 실패) 조용히 종료한다.
inputs:
  label:
    description: "커밋 메시지/로그에 쓰일 라벨 (예: zlib, msvc120-toolchain)"
    required: true
  paths:
    description: "git add 할 경로 (공백으로 구분된 glob 여러 개 가능, 예: 'out/*.lib')"
    required: true
runs:
  using: "composite"
  steps:
    - name: Commit and push (with retry)
      shell: pwsh
      run: |
        $ErrorActionPreference = "Continue"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        $label = "${{ inputs.label }}"
        $patterns = "${{ inputs.paths }}" -split '\s+' | Where-Object { $_ -ne "" }
        $existing = $patterns | ForEach-Object { Get-ChildItem -Path $_ -ErrorAction SilentlyContinue } |
                    ForEach-Object { $_.FullName }

        if (-not $existing) {
            Write-Host "[WARN] No files match '${{ inputs.paths }}' for '$label' - nothing to push (build likely failed)."
            exit 0
        }

        # 1. 루프 밖에서 단 한 번만 스테이징 및 커밋을 진행합니다.
        git add -- $patterns

        $status = git status --porcelain
        if (-not $status) {
            Write-Host "Nothing new to commit for '$label'."
            exit 0
        }

        git commit -m "ci: add $label output [skip ci]" | Out-Null

        $branch = $env:GITHUB_REF_NAME
        $pushed = $false

        # 2. 푸시 재시도 루프 (여기서는 오직 fetch, rebase, push만 수행합니다)
        for ($attempt = 1; $attempt -le 5; $attempt++) {
            Write-Host "Attempt $attempt to push '$label' output..."

            # 원격 상태를 가져옵니다.
            git fetch origin $branch 2>$null

            # [핵심] 리베이스 시 충돌이 나면 '현재 내 빌드 결과물(theirs)'을 무조건 우선하여 병합합니다.
            # 리베이스 컨텍스트에서 'theirs'는 우리가 방금 커밋한 로컬 변경사항을 의미합니다.
            git rebase -X theirs "origin/$branch" 2>$null

            if ($LASTEXITCODE -ne 0) {
                Write-Host "Rebase conflict on attempt $attempt for '$label' - aborting and retrying with clean state."
                git rebase --abort 2>$null
                
                # 혹시 모를 임시 상태 방지를 위해 원격 상태 강제 동기화 후 대기
                Start-Sleep -Seconds (Get-Random -Minimum 3 -Maximum 10)
                continue
            }

            # 푸시 시도
            git push origin "HEAD:$branch"
            if ($LASTEXITCODE -eq 0) {
                Write-Host "Pushed '$label' output to $branch."
                $pushed = $true
                break
            }

            Write-Host "Push rejected on attempt $attempt for '$label' (likely concurrent push) - resetting to pre-push commit and retrying."
            
            # 푸시가 거절당했을 경우, 리베이스 전 상태(로컬 커밋 상태)로 안전하게 되돌린 뒤 재시도합니다.
            git reset --hard HEAD~1 2>$null
            Start-Sleep -Seconds (Get-Random -Minimum 3 -Maximum 10)
        }

        if (-not $pushed) {
            Write-Host "::error::Failed to push '$label' output after multiple retries."
            exit 1
        }
