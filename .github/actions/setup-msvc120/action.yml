name: "Setup MSVC 12.0 (v120)"
description: >
  VS2013 Update 5 (v120) 커맨드라인 툴체인을 준비한다.
  의존성 누락으로 인한 빌드 실패를 막기 위해 VS2013 및 Windows SDK 8.1 설치 폴더 전체를 통째로 캐시한다.
outputs:
  vcvarsall:
    description: "설치된 vcvarsall.bat 의 절대 경로"
    value: ${{ steps.export-path.outputs.vcvarsall }}
runs:
  using: "composite"
  steps:
    - name: Cache MSVC v120 Toolchain (Full)
      id: cache-msvc
      uses: actions/cache@v4
      with:
        # VC 폴더만이 아닌 VS2013 전체와 Windows SDK 8.1 전체를 캐시 대상에 포함합니다.
        path: |
          C:/Program Files (x86)/Microsoft Visual Studio 12.0
          C:/Program Files (x86)/Windows Kits/8.1
        # 기존 잘못된 캐시를 무시하고 새로 캐시를 생성하기 위해 버전을 v2로 올립니다.
        key: msvc120-full-toolchain-v2

    - name: Install VS2013 from ISO
      if: steps.cache-msvc.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $IsoUrl    = "http://download.microsoft.com/download/2/E/E/2EEC68E6-7B03-437A-AF06-F8E43F04014D/vs2013.5_dskexp_ENU.iso"
        $IsoPath   = "$env:RUNNER_TEMP\vs2013.iso"

        Write-Host "No cached full toolchain found - installing VS2013 Update 5 (Desktop Express) from ISO."
        Invoke-WebRequest -Uri $IsoUrl -OutFile $IsoPath -UseBasicParsing
        $sizeMB = [Math]::Round((Get-Item $IsoPath).Length / 1MB, 1)
        Write-Host "Downloaded $IsoPath ($sizeMB MB)"

        $logPath = "$env:RUNNER_TEMP\vs2013_install.log"
        $mount = Mount-DiskImage -ImagePath $IsoPath -PassThru
        $driveLetter = ($mount | Get-Volume).DriveLetter
        $setupExe = "${driveLetter}:\wdexpress_full.exe"
        
        Write-Host "Mounted ISO at ${driveLetter}: - running $setupExe (silent)"
        $proc = Start-Process -FilePath $setupExe -ArgumentList "/Q", "/NoRestart", "/Log", $logPath -Wait -PassThru
        Write-Host "Installer exit code: $($proc.ExitCode)"
        Dismount-DiskImage -ImagePath $IsoPath

        # 0 = success, 3010 = success but reboot pending
        if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010) {
            Get-Content $logPath -ErrorAction SilentlyContinue | Select-Object -Last 200
            throw "[FATAL] VS2013 installer failed with exit code $($proc.ExitCode)"
        }
        
        Write-Host "Installation complete. The complete directories will be automatically cached at the end of the job."

    - name: Export vcvarsall path
      id: export-path
      shell: pwsh
      run: |
        $VsDir     = "C:\Program Files (x86)\Microsoft Visual Studio 12.0"
        $VcVarsAll = "$VsDir\VC\vcvarsall.bat"

        if (-not (Test-Path $VcVarsAll)) {
            throw "[FATAL] vcvarsall.bat not found at '$VcVarsAll'."
        }
        
        Write-Host "vcvarsall.bat ready at $VcVarsAll"
        "vcvarsall=$VcVarsAll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
