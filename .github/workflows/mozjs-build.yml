name: Build mozjs-24.2.0 (MSVC 12.0 / v120 toolset)

# =============================================================================
# third_party 내 6개 라이브러리를 MSVC 12.0 (Visual Studio 2013 Update 5,
# v120 toolset)으로 빌드해 .lib 로 산출한다.
#
#   컴파일 : cl /c /O2 /Z7 /GL /EHsc /D "WIN32" ...
#   보관   : lib /LTCG /MACHINE:X86 /OUT:xxx.lib *.obj
#
# 파일 구성:
#   - MSVC v120 설치/복원  -> .github/actions/setup-msvc120/action.yml (별도)
#   - git push (재시도)    -> .github/actions/push-output/action.yml   (별도)
#   - 6개 라이브러리 빌드  -> 이 파일 하나에 통합 (단일 job, 순차 step)
#
# 동작 방식:
#   - 모든 라이브러리 빌드가 하나의 job 안에서 순서대로 실행된다.
#   - 각 빌드 step은 continue-on-error: true 라 실패해도 job이 멈추지 않고
#     바로 다음 라이브러리 빌드로 넘어간다 (스킵).
#   - 각 빌드 step 직후 결과물이 있으면 바로 git push 한다 (build-output/ 이
#     비어 있으면, 즉 실패했으면 push-output이 조용히 스킵).
#
# ⚠️ 캐비어트
#   1) windows-2022 러너의 VS2022 설치 프로그램에는 "v120 (VS2013)" 개별
#      구성 요소가 없다 (VS2017부터 side-by-side 레거시 툴셋을 v140까지만
#      남기고 제거 - github.com/actions/runner-images#7390). setup-msvc120
#      action이 VS2013 Update 5 Desktop Express ISO를 직접 받아 설치하고,
#      필요한 VC\ 서브트리만 추출해 repo에 push해 다음 실행부터는
#      재설치 없이 복원만 하도록 한다.
#   2) js-1.8.5 (SpiderMonkey)는 configure 기반 빌드라 다른 5개와 다르고,
#      MozillaBuild 툴체인이 2011년 소스와 100% 호환된다는 보장이 없어
#      best-effort로 처리한다.
#   3) tiff-v3.4의 u_long/u_short/u_char 미정의(C2016/C2061), version.h
#      누락(C1083) 컴파일 실패는 아래 tiff step 안에서 직접 고친다.
# =============================================================================

on:
  workflow_dispatch:

# push하는 워크플로우이므로 같은 브랜치에서 여러 실행이 겹쳐 out/, tools/
# 커밋이 서로 경쟁하지 않도록 순차 실행시킨다.
concurrency:
  group: build-msvc120-libs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: mozjs build
        id: msvc
        uses: ./.github/actions/setup-msvc120

      - name: Prepare output dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-output | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null
      
      # ==========================================================================
      # mozjs (SpiderMonkey 24.2.0)
      # ==========================================================================
      - name: Install MozillaBuild
        shell: pwsh
        run: |
          # SpiderMonkey 24 빌드에 적합한 구형 MozillaBuild 2.2.0 다운로드 및 조용한 설치
          Write-Host "Downloading MozillaBuild..."
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-2.2.0.exe" -OutFile "mozillabuild.exe"
          Write-Host "Installing MozillaBuild to C:\mozilla-build..."
          Start-Process -FilePath ".\mozillabuild.exe" -ArgumentList "/S", "/D=C:\mozilla-build" -Wait -NoNewWindow
          Write-Host "MozillaBuild installation complete."

      - name: Build mozjs-24.2.0
        id: build-mozjs
        continue-on-error: true
        shell: cmd
        working-directory: third_party/mozjs-24.2.0
        run: |
          :: 1. MSVC v120 환경 로드
          call "C:\Program Files (x86)\Microsoft Visual Studio 12.0\VC\vcvarsall.bat" x86
          if errorlevel 1 exit /b 1

          :: 2. MozillaBuild 경로를 PATH의 최우선으로 추가
          set MOZILLABUILD=C:\mozilla-build
          set PATH=%MOZILLABUILD%\msys\bin;%MOZILLABUILD%\python;%MOZILLABUILD%\msys\local\bin;%PATH%
          set AUTOCONF=%MOZILLABUILD%\msys\local\bin\autoconf-2.13

          cd js\src
          if not exist build_msvc mkdir build_msvc
          cd build_msvc

          :: 3. MSVC 컴파일 플래그 설정 (하이픈 형식 사용)
          set CC=cl.exe
          set CXX=cl.exe
          set AR=lib.exe
          set CFLAGS=-nologo -O2 -Z7 -GL -DWIN32 -D_CRT_SECURE_NO_WARNINGS -D_CRT_NONSTDC_NO_DEPRECATE
          set CXXFLAGS=-nologo -O2 -Z7 -GL -EHsc -DWIN32 -D_CRT_SECURE_NO_WARNINGS -D_CRT_NONSTDC_NO_DEPRECATE
          set LDFLAGS=-LTCG -MACHINE:X86

          :: 4. 컴파일러 버전 에러 우회를 위한 전설의 환경 변수 및 옵션 선언
          :: JS_STANDALONE=1을 주입하고, configure에 --enable-official-branding 또는 컴파일러 검사 제외 플래그를 고려합니다.
          :: 여기서는 MSVC 18.00 버전 통과를 위해 무조건적인 configure 진행을 유도합니다.
          set JS_STANDALONE=1

          :: 5. configure 및 make 실행 (MozillaBuild의 bash 사용)
          :: --enable-optimize, --disable-debug 옵션과 함께 최적화 환경에서 빌드하게 지시합니다.
          bash -c "../configure --enable-optimize --disable-debug --enable-official-branding"
          if errorlevel 1 (
              echo "Configure failed!"
              exit /b 1
          )

          make
          if errorlevel 1 (
              echo "Make failed!"
              exit /b 1
          )

          :: 6. 결과물 복사
          if not exist "%GITHUB_WORKSPACE%\build-output" mkdir "%GITHUB_WORKSPACE%\build-output"
          copy /Y dist\lib\*.lib "%GITHUB_WORKSPACE%\build-output\" >nul
          copy /Y *.lib "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push mozjs-24.2.0 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\*.lib -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
          
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "mozjs-24.2.0"
          paths: "out/*.lib"          
      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $results = @{
            "mozjs-24.2.0"      = "${{ steps.build-mozjs.outcome }}"
          }
          foreach ($k in $results.Keys) {
            $v = $results[$k]
            if ($v -eq "success") { Write-Host "[OK]   $k" }
            else { Write-Host "::warning::[SKIP] $k ($v) - see its build step log above" }
          }
