name: Build third_party libs (MSVC 12.0 / v120 toolset)

on:
  workflow_dispatch:

concurrency:
  group: build-msvc120-libs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

# 환경 변수 전역 설정 (본인의 setup-msvc120 복원 경로에 맞게 MSVC_ROOT를 조절해 주세요)
env:
  # setup-msvc120 액션이 툴체인을 복원하는 폴더 내의 "VC" 디렉토리 경로
  MSVC_ROOT: "${{ github.workspace }}/.github/actions/setup-msvc120/VC"
  # windows-2022 러너에 기본 설치되어 있는 Windows 8.1 SDK 경로 (Static Library 링크용)
  SDK_ROOT: "C:\Program Files (x86)\\Windows Kits\\8.1"

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision (or restore) MSVC 12.0 (v120) toolchain
        id: msvc
        uses: ./.github/actions/setup-msvc120

      - name: Prepare output dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-output | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null

      # ==========================================================================
      # zlib-1.2.1
      # ==========================================================================
      - name: Build zlib-1.2.1
        id: build-zlib
        continue-on-error: true
        shell: cmd
        working-directory: third_party/zlib-1.2.1
        run: |
          :: vcvarsall.bat 없이 환경 변수 수동 바인딩
          set "PATH=%MSVC_ROOT%\bin;%PATH%"
          set "INCLUDE=%MSVC_ROOT%\include;%SDK_ROOT%\Include\um;%SDK_ROOT%\Include\shared"
          set "LIB=%MSVC_ROOT%\lib;%SDK_ROOT%\Lib\winv64\um\x86"

          if not exist build mkdir build
          cd build

          cl /nologo /c /O2 /Z7 /EHsc /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" ^
            ..\adler32.c ..\compress.c ..\crc32.c ..\deflate.c ..\gzio.c ^
            ..\infback.c ..\inffast.c ..\inflate.c ..\inftrees.c ..\trees.c ^
            ..\uncompr.c ..\zutil.c
          if errorlevel 1 exit /b 1

          lib /nologo /MACHINE:X86 /OUT:zlib-1.2.1.lib *.obj
          if errorlevel 1 exit /b 1

          copy /Y zlib-1.2.1.lib "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push zlib-1.2.1 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\zlib-1.2.1.lib -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "zlib-1.2.1"
          paths: "out/*.lib"

      # ==========================================================================
      # openjpeg-version.1.5.2 (libopenjpeg)
      # ==========================================================================
      - name: Generate opj_config.h
        continue-on-error: true
        shell: cmd
        working-directory: third_party/openjpeg-version.1.5.2/libopenjpeg
        run: |
          (
            echo /* generated for MSVC 12.0 build - no CMake available */
            echo #define PACKAGE_VERSION "1.5.2"
          ) > opj_config.h

      - name: Build openjpeg-1.5.2
        id: build-openjpeg
        continue-on-error: true
        shell: cmd
        working-directory: third_party/openjpeg-version.1.5.2/libopenjpeg
        run: |
          :: vcvarsall.bat 없이 환경 변수 수동 바인딩
          set "PATH=%MSVC_ROOT%\bin;%PATH%"
          set "INCLUDE=%MSVC_ROOT%\include;%SDK_ROOT%\Include\um;%SDK_ROOT%\Include\shared"
          set "LIB=%MSVC_ROOT%\lib;%SDK_ROOT%\Lib\winv64\um\x86"

          if not exist build mkdir build
          cd build

          cl /nologo /c /O2 /Z7 /EHsc /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" /I.. ^
            ..\bio.c ..\cidx_manager.c ..\cio.c ..\dwt.c ..\event.c ^
            ..\image.c ..\j2k.c ..\j2k_lib.c ..\jp2.c ..\jpt.c ..\mct.c ^
            ..\mqc.c ..\openjpeg.c ..\phix_manager.c ..\pi.c ^
            ..\ppix_manager.c ..\raw.c ..\t1.c ..\t2.c ..\tcd.c ..\tgt.c ^
            ..\thix_manager.c ..\tpix_manager.c
          if errorlevel 1 exit /b 1

          lib /nologo /MACHINE:X86 /OUT:openjpeg-1.5.2.lib *.obj
          if errorlevel 1 exit /b 1

          copy /Y openjpeg-1.5.2.lib "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push openjpeg-1.5.2 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\openjpeg-1.5.2.lib -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "openjpeg-1.5.2"
          paths: "out/*.lib"

      # ==========================================================================
      # tiff-v3.4 (libtiff)
      # ==========================================================================
      - name: Fix tiff-v3.4 - generate BSD-type compat header & version.h
        continue-on-error: true
        shell: pwsh
        working-directory: third_party/tiff-v3.4
        run: |
          @"
          #ifndef WIN_BSD_TYPES_COMPAT_H
          #define WIN_BSD_TYPES_COMPAT_H
          #ifndef WIN32_LEAN_AND_MEAN
          #define WIN32_LEAN_AND_MEAN
          #endif
          #include <winsock2.h>
          #endif /* WIN_BSD_TYPES_COMPAT_H */
          "@ | Set-Content -Path win_bsd_types_compat.h -Encoding ASCII

          '#define TIFFLIB_VERSION_STR "LIBTIFF, Version 3.4\nCopyright (c) 1988-2013 Sam Leffler\nCopyright (c) 1991-2013 Silicon Graphics, Inc."' |
            Set-Content -Path version.h -Encoding ASCII

      - name: Build tiff-v3.4
        id: build-tiff
        continue-on-error: true
        shell: cmd
        working-directory: third_party/tiff-v3.4/libtiff
        run: |
          :: vcvarsall.bat 없이 환경 변수 수동 바인딩
          set "PATH=%MSVC_ROOT%\bin;%PATH%"
          set "INCLUDE=%MSVC_ROOT%\include;%SDK_ROOT%\Include\um;%SDK_ROOT%\Include\shared"
          set "LIB=%MSVC_ROOT%\lib;%SDK_ROOT%\Lib\winv64\um\x86"

          if not exist build mkdir build
          cd build

          cl /nologo /c /O2 /Z7 /EHsc /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" ^
            /FI "..\win_bsd_types_compat.h" /I..\..\contrib\winnt /I.. /I..\..\..\zlib-1.2.1 ^
            ..\tif_aux.c ..\tif_close.c ..\tif_codec.c ..\tif_compress.c ^
            ..\tif_dir.c ..\tif_dirinfo.c ..\tif_dirread.c ..\tif_dirwrite.c ^
            ..\tif_dumpmode.c ..\tif_error.c ..\tif_fax3.c ..\tif_flush.c ^
            ..\tif_getimage.c ..\tif_lzw.c ..\tif_next.c ..\tif_open.c ^
            ..\tif_packbits.c ..\tif_pixarlog.c ..\tif_predict.c ..\tif_print.c ^
            ..\tif_read.c ..\tif_strip.c ..\tif_swab.c ..\tif_thunder.c ^
            ..\tif_tile.c ..\tif_version.c ..\tif_warning.c ..\tif_win32.c ^
            ..\tif_write.c ..\tif_zip.c
          if errorlevel 1 exit /b 1

          lib /nologo /MACHINE:X86 /OUT:tiff-v3.4.lib *.obj
          if errorlevel 1 exit /b 1

          copy /Y tiff-v3.4.lib "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push tiff-v3.4 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\tiff-v3.4.lib -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "tiff-v3.4"
          paths: "out/*.lib"

      # ==========================================================================
      # freetype-2.4.2
      # ==========================================================================
      - name: Build freetype-2.4.2
        id: build-freetype
        continue-on-error: true
        shell: cmd
        working-directory: third_party/freetype-2.4.2
        run: |
          :: vcvarsall.bat 없이 환경 변수 수동 바인딩
          set "PATH=%MSVC_ROOT%\bin;%PATH%"
          set "INCLUDE=%MSVC_ROOT%\include;%SDK_ROOT%\Include\um;%SDK_ROOT%\Include\shared"
          set "LIB=%MSVC_ROOT%\lib;%SDK_ROOT%\Lib\winv64\um\x86"

          if not exist build mkdir build
          cd build

          cl /nologo /c /O2 /Z7 /EHsc /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" ^
            /D "FT2_BUILD_LIBRARY" /I..\include /I..\builds\win32 ^
            ..\src\autofit\autofit.c ^
            ..\src\bdf\bdf.c ^
            ..\src\cff\cff.c ^
            ..\src\base\ftbase.c ^
            ..\src\base\ftbbox.c ^
            ..\src\base\ftbdf.c ^
            ..\src\base\ftbitmap.c ^
            ..\src\base\ftfstype.c ^
            ..\src\base\ftgasp.c ^
            ..\src\cache\ftcache.c ^
            ..\builds\win32\ftdebug.c ^
            ..\src\base\ftglyph.c ^
            ..\src\base\ftgxval.c ^
            ..\src\gzip\ftgzip.c ^
            ..\src\base\ftinit.c ^
            ..\src\lzw\ftlzw.c ^
            ..\src\base\ftmm.c ^
            ..\src\base\ftotval.c ^
            ..\src\base\ftpfr.c ^
            ..\src\base\ftstroke.c ^
            ..\src\base\ftsynth.c ^
            ..\src\base\ftsystem.c ^
            ..\src\base\fttype1.c ^
            ..\src\base\ftwinfnt.c ^
            ..\src\base\ftxf86.c ^
            ..\src\pcf\pcf.c ^
            ..\src\pfr\pfr.c ^
            ..\src\psaux\psaux.c ^
            ..\src\pshinter\pshinter.c ^
            ..\src\psnames\psmodule.c ^
            ..\src\raster\raster.c ^
            ..\src\sfnt\sfnt.c ^
            ..\src\smooth\smooth.c ^
            ..\src\truetype\truetype.c ^
            ..\src\type1\type1.c ^
            ..\src\cid\type1cid.c ^
            ..\src\type42\type42.c ^
            ..\src\winfonts\winfnt.c
          if errorlevel 1 exit /b 1

          lib /nologo /MACHINE:X86 /OUT:freetype-2.4.2.lib *.obj
          if errorlevel 1 exit /b 1

          copy /Y freetype-2.4.2.lib "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push freetype-2.4.2 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\freetype-2.4.2.lib -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "freetype-2.4.2"
          paths: "out/*.lib"

      # ==========================================================================
      # xpdf-3.01
      # ==========================================================================
      - name: Prepare xpdf win32 config
        continue-on-error: true
        shell: cmd
        working-directory: third_party/xpdf-3.01
        run: copy /Y aconf-win32.h aconf.h

      - name: Build xpdf-3.01
        id: build-xpdf
        continue-on-error: true
        shell: cmd
        working-directory: third_party/xpdf-3.01
        run: |
          :: vcvarsall.bat 없이 환경 변수 수동 바인딩
          set "PATH=%MSVC_ROOT%\bin;%PATH%"
          set "INCLUDE=%MSVC_ROOT%\include;%SDK_ROOT%\Include\um;%SDK_ROOT%\Include\shared"
          set "LIB=%MSVC_ROOT%\lib;%SDK_ROOT%\Lib\winv64\um\x86"

          if not exist build mkdir build
          cd build

          cl /nologo /c /O2 /Z7 /EHsc /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" ^
            /I.. /I..\goo /I..\fofi /I..\splash /I..\xpdf ^
            /I..\..\freetype-2.4.2\include ^
            ..\goo\FixedPoint.cc ..\goo\GHash.cc ..\goo\GList.cc ^
            ..\goo\GString.cc ..\goo\gfile.cc ..\goo\gmem.c ..\goo\gmempp.cc ^
            ..\goo\parseargs.c ^
            ..\fofi\FoFiBase.cc ..\fofi\FoFiEncodings.cc ..\fofi\FoFiTrueType.cc ^
            ..\fofi\FoFiType1.cc ..\fofi\FoFiType1C.cc ^
            ..\splash\Splash.cc ..\splash\SplashBitmap.cc ..\splash\SplashClip.cc ^
            ..\splash\SplashFTFontEngine.cc ^
            ..\splash\SplashFTFontFile.cc ..\splash\SplashFont.cc ^
            ..\splash\SplashFontEngine.cc ..\splash\SplashFontFile.cc ^
            ..\splash\SplashFontFileID.cc ..\splash\SplashPath.cc ^
            ..\splash\SplashPattern.cc ..\splash\SplashScreen.cc ^
            ..\splash\SplashState.cc ..\splash\SplashT1Font.cc ^
            ..\splash\SplashT1FontEngine.cc ..\splash\SplashT1FontFile.cc ^
            ..\splash\SplashXPath.cc ..\splash\SplashXPathScanner.cc ^
            ..\xpdf\Annot.cc ..\xpdf\Array.cc ..\xpdf\BuiltinFont.cc ^
            ..\xpdf\BuiltinFontTables.cc ..\xpdf\Catalog.cc ..\xpdf\CharCodeToUnicode.cc ^
            ..\xpdf\CMap.cc ..\xpdf\Decrypt.cc ..\xpdf\Dict.cc ..\xpdf\Error.cc ^
            ..\xpdf\FontEncodingTables.cc ..\xpdf\Function.cc ..\xpdf\Gfx.cc ^
            ..\xpdf\GfxFont.cc ..\xpdf\GfxState.cc ..\xpdf\GlobalParams.cc ^
            ..\xpdf\JArithmeticDecoder.cc ..\xpdf\JBIG2Stream.cc ..\xpdf\Lexer.cc ^
            ..\xpdf\Link.cc ..\xpdf\NameToCharCode.cc ..\xpdf\Object.cc ^
            ..\xpdf\OutputDev.cc ..\xpdf\Page.cc ..\xpdf\Parser.cc ^
            ..\xpdf\PDFDoc.cc ..\xpdf\PDFDocEncoding.cc ..\xpdf\PSTokenizer.cc ^
            ..\xpdf\SecurityHandler.cc ..\xpdf\Stream.cc ..\xpdf\TextOutputDev.cc ^
            ..\xpdf\UnicodeMap.cc ..\xpdf\UnicodeTypeTable.cc ..\xpdf\XRef.cc ^
            ..\xpdf\XpdfPluginAPI.cc ..\xpdf\PSOutputDev.cc
          if errorlevel 1 exit /b 1

          lib /nologo /MACHINE:X86 /OUT:xpdf-3.01.lib *.obj
          if errorlevel 1 exit /b 1

          copy /Y xpdf-3.01.lib "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push xpdf-3.01 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\xpdf-3.01.lib -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "xpdf-3.01"
          paths: "out/*.lib"

      # ==========================================================================
      # js-1.8.5 (SpiderMonkey) - configure 기반, best effort
      # ==========================================================================
      - name: Install MozillaBuild
        continue-on-error: true
        shell: pwsh
        run: |
          $exePath = "$env:RUNNER_TEMP\MozillaBuildSetup.exe"
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe" -OutFile $exePath -UseBasicParsing
          Start-Process -FilePath $exePath -ArgumentList "/S" -Wait

      - name: Build js-1.8.5 (best effort)
        id: build-js185
        continue-on-error: true
        shell: cmd
        working-directory: third_party/js-1.8.5/js/src
        run: |
          if not exist "C:\mozilla-build\start-shell.bat" (
            echo [WARN] MozillaBuild not found - skipping js-1.8.5 build.
            exit /b 1
          )

          :: MozillaBuild 터미널 세션 내부 진입을 위해 최소한의 환경 변수 매핑
          set "PATH=%MSVC_ROOT%\bin;%PATH%"
          set "INCLUDE=%MSVC_ROOT%\include;%SDK_ROOT%\Include\um;%SDK_ROOT%\Include\shared"
          set "LIB=%MSVC_ROOT%\lib;%SDK_ROOT%\Lib\winv64\um\x86"
          
          set MOZ_TOOLS=C:\mozilla-build
          "C:\mozilla-build\start-shell.bat" -c "cd js/src && ./configure --enable-optimize --disable-debug --target=i686-pc-mingw32 --with-macos-sdk=no && make"
          if errorlevel 1 exit /b 1

          for /r %%f in (*.lib) do copy /Y "%%f" "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push js-1.8.5 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\*.lib -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notin @("zlib-1.2.1.lib","openjpeg-1.5.2.lib","tiff-v3.4.lib","freetype-2.4.2.lib","xpdf-3.01.lib") } |
            Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "js-1.8.5"
          paths: "out/*.lib"

      # ==========================================================================
      # Summary
      # ==========================================================================
      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $results = @{
            "zlib-1.2.1"      = "${{ steps.build-zlib.outcome }}"
            "openjpeg-1.5.2"  = "${{ steps.build-openjpeg.outcome }}"
            "tiff-v3.4"       = "${{ steps.build-tiff.outcome }}"
            "freetype-2.4.2"  = "${{ steps.build-freetype.outcome }}"
            "xpdf-3.01"       = "${{ steps.build-xpdf.outcome }}"
            "js-1.8.5"        = "${{ steps.build-js185.outcome }}"
          }
          foreach ($k in $results.Keys) {
            $v = $results[$k]
            if ($v -eq "success") { Write-Host "[OK]   $k" }
            else { Write-Host "::warning::[SKIP] $k ($v) - see its build step log above" }
          }
