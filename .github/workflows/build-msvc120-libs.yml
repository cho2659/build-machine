name: Build third_party libs (MSVC 12.0 / v120 toolset) - DLL + PDB Edition

# =============================================================================
# third_party 내 5개 라이브러리를 MSVC 12.0 (Visual Studio 2013 Update 5,
# v120 toolset)으로 빌드해 .dll 및 .pdb 로 산출한다.
# =============================================================================

on:
  workflow_dispatch:

concurrency:
  group: build-msvc120-libs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision (or restore) MSVC 12.0 (v120) toolchain
        id: msvc
        uses: ./.github/actions/setup-msvc120

      - name: Prepare output dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-output | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null

      # ==========================================================================
      # zlib-1.2.1
      # ==========================================================================
      - name: Build zlib-1.2.1
        id: build-zlib
        continue-on-error: true
        shell: cmd
        working-directory: third_party/zlib-1.2.1
        run: |
          call "${{ steps.msvc.outputs.vcvarsall }}" x86
          if errorlevel 1 exit /b 1

          if not exist build mkdir build
          cd build

          cl /nologo /c /O2 /Z7 /GL /EHsc /MD /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" ^
            ..\adler32.c ..\compress.c ..\crc32.c ..\deflate.c ..\gzio.c ^
            ..\infback.c ..\inffast.c ..\inflate.c ..\inftrees.c ..\trees.c ^
            ..\uncompr.c ..\zutil.c
          if errorlevel 1 exit /b 1

          link /nologo /DLL /LTCG /DEBUG /MACHINE:X86 /OUT:zlib-1.2.1.dll *.obj
          if errorlevel 1 exit /b 1

          copy /Y zlib-1.2.1.dll "%GITHUB_WORKSPACE%\build-output\" >nul
          copy /Y zlib-1.2.1.pdb "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push zlib-1.2.1 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\zlib-1.2.1.dll, build-output\zlib-1.2.1.pdb -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "zlib-1.2.1"
          paths: "out/*"

      # ==========================================================================
      # openjpeg-version.1.5.2 (libopenjpeg)
      # ==========================================================================
      - name: Generate opj_config.h
        continue-on-error: true
        shell: cmd
        working-directory: third_party/openjpeg-version.1.5.2/libopenjpeg
        run: |
          (
            echo /* generated for MSVC 12.0 build - no CMake available */
            echo #define PACKAGE_VERSION "1.5.2"
          ) > opj_config.h

      - name: Build openjpeg-1.5.2
        id: build-openjpeg
        continue-on-error: true
        shell: cmd
        working-directory: third_party/openjpeg-version.1.5.2/libopenjpeg
        run: |
          call "${{ steps.msvc.outputs.vcvarsall }}" x86
          if errorlevel 1 exit /b 1

          if not exist build mkdir build
          cd build

          cl /nologo /c /O2 /Z7 /GL /EHsc /MD /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" /I.. ^
            ..\bio.c ..\cidx_manager.c ..\cio.c ..\dwt.c ..\event.c ^
            ..\image.c ..\j2k.c ..\j2k_lib.c ..\jp2.c ..\jpt.c ..\mct.c ^
            ..\mqc.c ..\openjpeg.c ..\phix_manager.c ..\pi.c ^
            ..\ppix_manager.c ..\raw.c ..\t1.c ..\t2.c ..\tcd.c ..\tgt.c ^
            ..\thix_manager.c ..\tpix_manager.c
          if errorlevel 1 exit /b 1

          link /nologo /DLL /LTCG /DEBUG /MACHINE:X86 /OUT:openjpeg-1.5.2.dll *.obj
          if errorlevel 1 exit /b 1

          copy /Y openjpeg-1.5.2.dll "%GITHUB_WORKSPACE%\build-output\" >nul
          copy /Y openjpeg-1.5.2.pdb "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push openjpeg-1.5.2 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\openjpeg-1.5.2.dll, build-output\openjpeg-1.5.2.pdb -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "openjpeg-1.5.2"
          paths: "out/*"

      # ==========================================================================
      # tiff-v3.4 (libtiff)
      # ==========================================================================
      - name: Fix tiff-v3.4 - generate BSD-type compat header & version.h
        continue-on-error: true
        shell: pwsh
        working-directory: third_party/tiff-v3.4
        run: |
          @"
          #ifndef WIN_BSD_TYPES_COMPAT_H
          #define WIN_BSD_TYPES_COMPAT_H
          #ifndef WIN32_LEAN_AND_MEAN
          #define WIN32_LEAN_AND_MEAN
          #endif
          #include <winsock2.h>
          #endif /* WIN_BSD_TYPES_COMPAT_H */
          "@ | Set-Content -Path win_bsd_types_compat.h -Encoding ASCII

          '#define TIFFLIB_VERSION_STR "LIBTIFF, Version 3.4\nCopyright (c) 1988-2013 Sam Leffler\nCopyright (c) 1991-2013 Silicon Graphics, Inc."' |
            Set-Content -Path version.h -Encoding ASCII

      - name: Build tiff-v3.4
        id: build-tiff
        continue-on-error: true
        shell: cmd
        working-directory: third_party/tiff-v3.4/libtiff
        run: |
          call "${{ steps.msvc.outputs.vcvarsall }}" x86
          if errorlevel 1 exit /b 1

          if not exist build mkdir build
          cd build

          :: tif_fax3sm.c 동적 생성을 위해 mkg3states 컴파일 (getopt 의존성을 피하기 위해 dummy_getopt.c 사용)
          :: [FIX] tif_error.c/tif_warning.c가 tiffiop.h -> tif_dir.h를 include하면서 u_long/u_short
          :: 등 BSD 타입을 요구하므로, 본 빌드와 동일하게 /FI win_bsd_types_compat.h 를 강제 포함해야 한다.
          :: (이전에는 이 플래그가 빠져 있어 mkg3states.exe 빌드가 조용히 실패 -> tif_fax3sm.c 미생성 ->
          ::  본 컴파일에서 "Cannot open source file: '..\tif_fax3sm.c'" 로 이어졌음)
          :: [FIX] LNK2019: unresolved external symbol __TIFFerrorHandler / __TIFFwarningHandler.
          :: mkg3states.c가 tif_error.c/tif_warning.c의 TIFFError()/TIFFSetWarningHandler()를
          :: 끌어오는데, 이 심볼들의 실제 저장소(전역 변수)는 tif_error.c/tif_warning.c 자체가
          :: 아니라 tif_win32.c 쪽에 있는 것으로 보인다(본 tiff DLL 빌드 파일 목록엔 있지만
          :: 이 mini 빌드에는 빠져 있던 유일한 파일). tif_win32.c와, 그것이 쓰는 user32.lib를
          :: 함께 추가한다.
          echo int optind = 1; char *optarg = 0; int getopt(int argc, char **argv, char *opts) { return -1; } > dummy_getopt.c
          cl /nologo /O2 /MD /D "WIN32" /FI "..\win_bsd_types_compat.h" /I.. /Fe:mkg3states.exe ..\mkg3states.c dummy_getopt.c ..\tif_error.c ..\tif_warning.c ..\tif_win32.c user32.lib
          if errorlevel 1 exit /b 1
          if not exist mkg3states.exe (
              echo [FATAL] mkg3states.exe was not produced.
              exit /b 1
          )
          mkg3states.exe ..\tif_fax3sm.c
          if errorlevel 1 exit /b 1
          if not exist ..\tif_fax3sm.c (
              echo [FATAL] ..\tif_fax3sm.c was not generated.
              exit /b 1
          )

          :: tif_fax3sm.c 생성 후 다시 컴파일에 포함시킴
          cl /nologo /c /O2 /Z7 /GL /EHsc /MD /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" ^
            /FI "..\win_bsd_types_compat.h" /I..\..\contrib\winnt /I.. /I..\..\..\zlib-1.2.1 ^
            ..\tif_aux.c ..\tif_close.c ..\tif_codec.c ..\tif_compress.c ^
            ..\tif_dir.c ..\tif_dirinfo.c ..\tif_dirread.c ..\tif_dirwrite.c ^
            ..\tif_dumpmode.c ..\tif_error.c ..\tif_fax3.c ..\tif_fax3sm.c ..\tif_flush.c ^
            ..\tif_getimage.c ..\tif_lzw.c ..\tif_next.c ..\tif_open.c ^
            ..\tif_packbits.c ..\tif_pixarlog.c ..\tif_predict.c ..\tif_print.c ^
            ..\tif_read.c ..\tif_strip.c ..\tif_swab.c ..\tif_thunder.c ^
            ..\tif_tile.c ..\tif_version.c ..\tif_warning.c ..\tif_win32.c ^
            ..\tif_write.c ..\tif_zip.c
          if errorlevel 1 exit /b 1

          :: user32.lib를 링크 대상에 추가
          link /nologo /DLL /LTCG /DEBUG /MACHINE:X86 /OUT:tiff-v3.4.dll *.obj user32.lib
          if errorlevel 1 exit /b 1

          copy /Y tiff-v3.4.dll "%GITHUB_WORKSPACE%\build-output\" >nul
          copy /Y tiff-v3.4.pdb "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push tiff-v3.4 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\tiff-v3.4.dll, build-output\tiff-v3.4.pdb -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "tiff-v3.4"
          paths: "out/*"

      # ==========================================================================
      # freetype-2.4.2
      # ==========================================================================
      - name: Build freetype-2.4.2
        id: build-freetype
        continue-on-error: true
        shell: cmd
        working-directory: third_party/freetype-2.4.2
        run: |
          call "${{ steps.msvc.outputs.vcvarsall }}" x86
          if errorlevel 1 exit /b 1

          if not exist build mkdir build
          cd build

          :: DLL Export를 위해 FT2_DLL 및 DLL_EXPORT 플래그 추가
          cl /nologo /c /O2 /Z7 /GL /EHsc /MD /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" ^
            /D "FT2_BUILD_LIBRARY" /D "FT2_DLL" /D "DLL_EXPORT" /I..\include /I..\builds\win32 ^
            ..\src\autofit\autofit.c ^
            ..\src\bdf\bdf.c ^
            ..\src\cff\cff.c ^
            ..\src\base\ftbase.c ^
            ..\src\base\ftbbox.c ^
            ..\src\base\ftbdf.c ^
            ..\src\base\ftbitmap.c ^
            ..\src\base\ftfstype.c ^
            ..\src\base\ftgasp.c ^
            ..\src\cache\ftcache.c ^
            ..\builds\win32\ftdebug.c ^
            ..\src\base\ftglyph.c ^
            ..\src\base\ftgxval.c ^
            ..\src\gzip\ftgzip.c ^
            ..\src\base\ftinit.c ^
            ..\src\lzw\ftlzw.c ^
            ..\src\base\ftmm.c ^
            ..\src\base\ftotval.c ^
            ..\src\base\ftpfr.c ^
            ..\src\base\ftstroke.c ^
            ..\src\base\ftsynth.c ^
            ..\src\base\ftsystem.c ^
            ..\src\base\fttype1.c ^
            ..\src\base\ftwinfnt.c ^
            ..\src\base\ftxf86.c ^
            ..\src\pcf\pcf.c ^
            ..\src\pfr\pfr.c ^
            ..\src\psaux\psaux.c ^
            ..\src\pshinter\pshinter.c ^
            ..\src\psnames\psmodule.c ^
            ..\src\raster\raster.c ^
            ..\src\sfnt\sfnt.c ^
            ..\src\smooth\smooth.c ^
            ..\src\truetype\truetype.c ^
            ..\src\type1\type1.c ^
            ..\src\cid\type1cid.c ^
            ..\src\type42\type42.c ^
            ..\src\winfonts\winfnt.c
          if errorlevel 1 exit /b 1

          :: [FIX] /IMPLIB 로 임포트 라이브러리 이름을 명시적으로 고정한다.
          link /nologo /DLL /LTCG /DEBUG /MACHINE:X86 /OUT:freetype-2.4.2.dll /IMPLIB:freetype-2.4.2.lib *.obj
          if errorlevel 1 exit /b 1

          if not exist freetype-2.4.2.dll (
              echo [FATAL] freetype-2.4.2.dll was not produced.
              exit /b 1
          )

          :: xpdf 빌드 시 참조 가능하도록 .lib 파일도 함께 복사
          copy /Y freetype-2.4.2.dll "%GITHUB_WORKSPACE%\build-output\" >nul
          if errorlevel 1 exit /b 1
          copy /Y freetype-2.4.2.pdb "%GITHUB_WORKSPACE%\build-output\" >nul
          if errorlevel 1 exit /b 1

          :: [FIX] .lib 는 심볼 export가 하나도 없으면 생성되지 않을 수 있으므로,
          :: 존재할 때만 복사하고 없어도 스텝 전체를 실패시키지 않는다.
          :: (이전에는 이 copy가 스크립트의 "마지막 명령"이라 실패 시 그 종료 코드가
          ::  그대로 스텝의 종료 코드가 되어, dll/pdb가 정상 생성돼도 스텝이 실패로 표시되었음)
          if exist freetype-2.4.2.lib (
              copy /Y freetype-2.4.2.lib "%GITHUB_WORKSPACE%\build-output\" >nul
          ) else (
              echo [WARN] freetype-2.4.2.lib not found - xpdf link step may fail without it.
          )

      - name: Push freetype-2.4.2 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\freetype-2.4.2.dll, build-output\freetype-2.4.2.pdb, build-output\freetype-2.4.2.lib -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "freetype-2.4.2"
          paths: "out/*"

      # ==========================================================================
      # xpdf-3.01
      # ==========================================================================
      - name: Prepare xpdf win32 config
        continue-on-error: true
        shell: cmd
        working-directory: third_party/xpdf-3.01
        run: copy /Y aconf-win32.h aconf.h

      - name: Build xpdf-3.01
        id: build-xpdf
        continue-on-error: true
        shell: cmd
        working-directory: third_party/xpdf-3.01
        run: |
          call "${{ steps.msvc.outputs.vcvarsall }}" x86
          if errorlevel 1 exit /b 1

          if not exist build mkdir build
          cd build

          :: [FIX] SplashFTFont.cc(17) : error C2006 / C1083 ("#include FT_FREETYPE_H" 매크로가
          :: 비어있는 채로 확장됨). tiff-v3.4의 win_bsd_types_compat.h와 동일한 방식으로,
          :: 소스의 include 순서를 직접 추측/수정하는 대신 ft2build.h 를 모든 xpdf 소스에
          :: /FI 로 강제 선행 include 시켜, FT_FREETYPE_H 매크로가 항상 정의되어 있는
          :: 상태에서 컴파일되도록 한다. HAVE_FREETYPE_FREETYPE_H 는 freetype-2.4.2의
          :: include 구조(freetype/freetype.h가 include 루트 밑에 중첩)에 맞는 정의라
          :: 그대로 유지한다.
          cl /nologo /c /O2 /Z7 /GL /EHsc /MD /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" /D "HAVE_FREETYPE_FREETYPE_H" ^
          /FI "..\..\freetype-2.4.2\include\ft2build.h" ^
          /I.. /I..\goo /I..\fofi /I..\splash /I..\xpdf ^
          /I..\..\freetype-2.4.2\include ^
          ..\goo\FixedPoint.cc ..\goo\GHash.cc ..\goo\GList.cc ^
          ..\goo\GString.cc ..\goo\gfile.cc ..\goo\gmem.c ..\goo\gmempp.cc ^
          ..\goo\parseargs.c ^
          ..\fofi\FoFiBase.cc ..\fofi\FoFiEncodings.cc ..\fofi\FoFiTrueType.cc ^
          ..\fofi\FoFiType1.cc ..\fofi\FoFiType1C.cc ^
          ..\splash\Splash.cc ..\splash\SplashBitmap.cc ..\splash\SplashClip.cc ^
          ..\splash\SplashFTFontEngine.cc ^
          ..\splash\SplashFTFontFile.cc ..\splash\SplashFTFont.cc ..\splash\SplashFont.cc ^
          ..\splash\SplashFontEngine.cc ..\splash\SplashFontFile.cc ^
          ..\splash\SplashFontFileID.cc ..\splash\SplashPath.cc ^
          ..\splash\SplashPattern.cc ..\splash\SplashScreen.cc ^
          ..\splash\SplashState.cc ..\splash\SplashT1Font.cc ^
          ..\splash\SplashT1FontEngine.cc ..\splash\SplashT1FontFile.cc ^
          ..\splash\SplashXPath.cc ..\splash\SplashXPathScanner.cc ^
          ..\xpdf\Annot.cc ..\xpdf\Array.cc ..\xpdf\BuiltinFont.cc ^
          ..\xpdf\BuiltinFontTables.cc ..\xpdf\Catalog.cc ..\xpdf\CharCodeToUnicode.cc ^
          ..\xpdf\CMap.cc ..\xpdf\Decrypt.cc ..\xpdf\Dict.cc ..\xpdf\Error.cc ^
          ..\xpdf\FontEncodingTables.cc ..\xpdf\Function.cc ..\xpdf\Gfx.cc ^
          ..\xpdf\GfxFont.cc ..\xpdf\GfxState.cc ..\xpdf\GlobalParams.cc ^
          ..\xpdf\JArithmeticDecoder.cc ..\xpdf\JBIG2Stream.cc ..\xpdf\JPXStream.cc ..\xpdf\Lexer.cc ^
          ..\xpdf\Link.cc ..\xpdf\NameToCharCode.cc ..\xpdf\Object.cc ^
          ..\xpdf\Outline.cc ..\xpdf\OutputDev.cc ..\xpdf\Page.cc ..\xpdf\Parser.cc ^
          ..\xpdf\PDFDoc.cc ..\xpdf\PDFDocEncoding.cc ..\xpdf\PSTokenizer.cc ^
          ..\xpdf\SecurityHandler.cc ..\xpdf\Stream.cc ..\xpdf\TextOutputDev.cc ^
          ..\xpdf\UnicodeMap.cc ..\xpdf\UnicodeTypeTable.cc ..\xpdf\XRef.cc ^
          ..\xpdf\XpdfPluginAPI.cc ..\xpdf\PSOutputDev.cc
          if errorlevel 1 exit /b 1

          if not exist "%GITHUB_WORKSPACE%\build-output\freetype-2.4.2.lib" (
              echo [FATAL] freetype-2.4.2.lib not found in build-output - freetype step must succeed and produce a .lib first.
              exit /b 1
          )

          link /nologo /DLL /LTCG /DEBUG /MACHINE:X86 /LIBPATH:"%GITHUB_WORKSPACE%\build-output" /OUT:xpdf-3.01.dll *.obj freetype-2.4.2.lib gdi32.lib
          if errorlevel 1 exit /b 1

          copy /Y xpdf-3.01.dll "%GITHUB_WORKSPACE%\build-output\" >nul
          copy /Y xpdf-3.01.pdb "%GITHUB_WORKSPACE%\build-output\" >nul

      - name: Push xpdf-3.01 output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem build-output\xpdf-3.01.dll, build-output\xpdf-3.01.pdb -ErrorAction SilentlyContinue | Copy-Item -Destination out -Force
      - uses: ./.github/actions/push-output
        if: always()
        with:
          label: "xpdf-3.01"
          paths: "out/*"

      # ==========================================================================
      # Summary
      # ==========================================================================
      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $results = @{
            "zlib-1.2.1"      = "${{ steps.build-zlib.outcome }}"
            "openjpeg-1.5.2"  = "${{ steps.build-openjpeg.outcome }}"
            "tiff-v3.4"       = "${{ steps.build-tiff.outcome }}"
            "freetype-2.4.2"  = "${{ steps.build-freetype.outcome }}"
            "xpdf-3.01"       = "${{ steps.build-xpdf.outcome }}"
          }
          foreach ($k in $results.Keys) {
            $v = $results[$k]
            if ($v -eq "success") { Write-Host "[OK]   $k" }
            else { Write-Host "::warning::[SKIP] $k ($v) - see its build step log above" }
          }
