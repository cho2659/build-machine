name: Build third_party libs (MSVC 12.0 / v120 toolset)

# =============================================================================
# third_party 내 6개 라이브러리를 MSVC 12.0 (Visual Studio 2013 Update 5,
# v120 toolset)으로 빌드해 .lib 로 산출한다.
#
#   컴파일 : cl /c /O2 /Z7 /GL /EHsc /D "WIN32" ...
#   보관   : lib /LTCG /MACHINE:X86 /OUT:xxx.lib *.obj
#
# 파일 구성:
#   - MSVC v120 설치/복원  -> .github/actions/setup-msvc120/action.yml (별도)
#   - git push (재시도)    -> .github/actions/push-output/action.yml   (별도)
#   - 6개 라이브러리 빌드  -> 이 파일에서 "라이브러리당 별도 job"으로 병렬 실행
#
# 동작 방식 (v2 - job 분리):
#   - 이전 버전은 하나의 job 안에서 6개 라이브러리를 순차 step으로 빌드하고,
#     모두 같은 out/ 폴더를 재사용(Remove-Item out\* 로 비운 뒤 한 개만 채움)
#     했다. 이 방식은 `git add -- out/*.lib` 가 "지금 out/ 에 없는, 그러나
#     예전에 커밋된" 동일 glob 매치 파일까지 삭제로 스테이징해버리는 부작용이
#     있었다 (git 2.x의 pathspec add는 삭제도 함께 스테이징한다). 그 결과
#     zlib -> openjpeg -> ... 순서로 push할 때마다 직전 라이브러리가 repo에서
#     지워지고, 마지막까지 살아남은 라이브러리(freetype)만 out/ 에 남았다.
#   - v2에서는 이 문제를 구조적으로 제거한다:
#       1) 라이브러리마다 완전히 별도의 job으로 분리한다 (병렬 실행, Actions
#          UI에서도 각 라이브러리가 별도 항목으로 출력된다).
#       2) 출력 경로도 라이브러리마다 전용 디렉토리를 쓴다
#          (out/<lib>/<lib>.lib). 다른 라이브러리의 경로와 절대 겹치지 않으므로
#          Remove-Item으로 폴더를 통째로 비울 필요도, git add가 다른
#          라이브러리의 파일을 실수로 삭제로 스테이징할 위험도 없다.
#       3) 빌드 결과는 (기존처럼) repo의 out/ 아래로 git push 하는 것에 더해,
#          workflow artifact로도 별도 업로드한다. Actions 실행 화면에서
#          라이브러리별로 바로 다운로드할 수 있다.
#   - MSVC v120 툴체인은 provision job에서 한 번만 준비(복원 또는 최초 설치)
#     하고, 이후 6개 build job은 그 결과물을 artifact로 내려받아 재사용한다
#     (각 job이 별도 러너이므로 job.outputs 로 파일 경로를 못 넘기고, git
#     push 완료 타이밍에 의존하면 checkout이 push 이전 SHA를 볼 수 있어
#     artifact 방식이 더 안전하다).
#   - 각 빌드 step은 continue-on-error: true 라 실패해도 job이 멈추지 않고
#     "빌드 실패"로 표시된 채 다음 단계(push/summary)로 넘어간다 (스킵).
#
# ⚠️ 캐비어트
#   1) windows-2022 러너의 VS2022 설치 프로그램에는 "v120 (VS2013)" 개별
#      구성 요소가 없다 (VS2017부터 side-by-side 레거시 툴셋을 v140까지만
#      남기고 제거 - github.com/actions/runner-images#7390). setup-msvc120
#      action이 VS2013 Update 5 Desktop Express ISO를 직접 받아 설치하고,
#      필요한 VC\ 서브트리만 추출해 repo에 push해 다음 실행부터는
#      재설치 없이 복원만 하도록 한다.
#   2) js-1.8.5 (SpiderMonkey)는 configure 기반 빌드라 다른 5개와 다르고,
#      MozillaBuild 툴체인이 2011년 소스와 100% 호환된다는 보장이 없어
#      best-effort로 처리한다.
#   3) tiff-v3.4의 u_long/u_short/u_char 미정의(C2016/C2061), version.h
#      누락(C1083) 컴파일 실패는 tiff build job 안에서 직접 고친다.
# =============================================================================

on:
  workflow_dispatch:

# push하는 워크플로우이므로 같은 브랜치에서 여러 "실행(run)"이 겹쳐 out/,
# tools/ 커밋이 서로 경쟁하지 않도록 workflow 단위로는 순차 실행시킨다.
# (같은 run 안에서 build job들이 병렬로 도는 것은 이 concurrency와 무관하며,
# 동시 push는 push-output action의 fetch+rebase 재시도로 처리한다.)
concurrency:
  group: build-msvc120-libs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ===========================================================================
  # MSVC v120 툴체인을 한 번만 준비(복원 또는 최초 설치)하고, 6개 build job이
  # 공유해 쓸 수 있도록 workflow artifact로 올려둔다.
  # ===========================================================================
  provision-toolchain:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision (or restore) MSVC 12.0 (v120) toolchain
        id: msvc
        uses: ./.github/actions/setup-msvc120

      # setup-msvc120 action은 fast/slow path 어느 쪽이든 끝나고 나면
      # tools/msvc120-x86.zip 이 워크스페이스에 존재하도록 보장한다.
      - name: Upload toolchain artifact for build jobs
        uses: actions/upload-artifact@v4
        with:
          name: msvc120-toolchain
          path: tools/msvc120-x86.zip
          retention-days: 1
          if-no-files-found: error

  # ===========================================================================
  # zlib-1.2.1
  # ===========================================================================
  build-zlib:
    needs: provision-toolchain
    runs-on: windows-2022
    outputs:
      outcome: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download shared MSVC toolchain artifact
        uses: actions/download-artifact@v4
        with:
          name: msvc120-toolchain
          path: tools

      - name: Restore MSVC 12.0 (v120) toolchain
        id: msvc
        uses: ./.github/actions/setup-msvc120

      - name: Prepare output dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-output | Out-Null
          New-Item -ItemType Directory -Force -Path out/zlib-1.2.1 | Out-Null

      - name: Build zlib-1.2.1
        id: build
        continue-on-error: true
        shell: cmd
        working-directory: third_party/zlib-1.2.1
        run: |
          call "${{ steps.msvc.outputs.vcvarsall }}" x86
          if errorlevel 1 exit /b 1

          if not exist build mkdir build
          cd build

          cl /nologo /c /O2 /Z7 /GL /EHsc /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE" ^
            ..\adler32.c ..\compress.c ..\crc32.c ..\deflate.c ..\gzio.c ^
            ..\infback.c ..\inffast.c ..\inflate.c ..\inftrees.c ..\trees.c ^
            ..\uncompr.c ..\zutil.c
