  # ===========================================================================
  # 요약: 어떤 라이브러리가 실패했는지 로그로 남긴다 (job 자체는 계속 성공
  # 처리 - 실패한 빌드는 스킵하고 넘어가는 것이 요구사항이라 build job을
  # 굳이 실패 처리하지 않는다. 대신 각 build job이 outputs.outcome 으로
  # 실제 빌드 step의 성공/실패를 전달하고, 여기서 한곳에 모아 보여준다).
  # ===========================================================================
  summary:
    needs:
      - build-zlib
      - build-openjpeg
      - build-tiff
      - build-freetype
      - build-xpdf
      - build-js185
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print per-library build results
        shell: bash
        run: |
          declare -A results=(
            ["zlib-1.2.1"]="${{ needs.build-zlib.outputs.outcome }}"
            ["openjpeg-1.5.2"]="${{ needs.build-openjpeg.outputs.outcome }}"
            ["tiff-v3.4"]="${{ needs.build-tiff.outputs.outcome }}"
            ["freetype-2.4.2"]="${{ needs.build-freetype.outputs.outcome }}"
            ["xpdf-3.01"]="${{ needs.build-xpdf.outputs.outcome }}"
            ["js-1.8.5"]="${{ needs.build-js185.outputs.outcome }}"
          )
          for k in "${!results[@]}"; do
            v="${results[$k]}"
            if [ "$v" = "success" ]; then
              echo "[OK]   $k"
            else
              echo "::warning::[SKIP] $k ($v) - see its build job log above"
            fi
          done
