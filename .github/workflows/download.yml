name: Build Third-Party Libraries

on:
  workflow_dispatch: # 수동 실행 기능하도록 설정

jobs:
  build-dependencies:
    runs-on: ubuntu-latest

    steps:
      # 1. 메인 리포지토리 체크아웃
      # [중คัญ] push를 해야 하므로 fetch-depth를 0으로 설정하여 전체 기록을 가져옵니다.
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 서드파티 소스들을 저장할 폴더 생성
      - name: Create third-party directory
        run: mkdir -p third_party

      # 3. 다운로드 및 압축 해제 단계
      - name: Download and Extract Third-Party Sources
        run: |
          cd third_party
          
          echo "=== 1. zlib ==="
          wget -q https://github.com/madler/zlib/archive/refs/tags/v1.2.1.tar.gz -O zlib-1.2.1.tar.gz
          tar -xzf zlib-1.2.1.tar.gz && rm zlib-1.2.1.tar.gz

          echo "=== 2. openjpeg ==="
          wget -q https://github.com/uclouvain/openjpeg/archive/refs/tags/version.1.5.2.tar.gz -O openjpeg-version.1.5.2.tar.gz
          tar -xzf openjpeg-version.1.5.2.tar.gz && rm openjpeg-version.1.5.2.tar.gz

          echo "=== 3. spider monkey ==="
          wget -q https://archive.mozilla.org/pub/js/js185-1.0.0.tar.gz -O js185-1.0.0.tar.gz
          tar -xzf js185-1.0.0.tar.gz && rm js185-1.0.0.tar.gz

          echo "=== 4. libtiff ==="
          wget -q https://download.osgeo.org/libtiff/old/tiff-v3.4-tar.gz -O tiff-v3.4-tar.gz
          tar -xzf tiff-v3.4-tar.gz && rm tiff-v3.4-tar.gz

          echo "=== 5. freetype ==="
          curl -L "https://sourceforge.net/projects/freetype/files/freetype2/2.4.2/freetype-2.4.2.tar.gz/download" -o freetype-2.4.2.tar.gz
          tar -xzf freetype-2.4.2.tar.gz && rm freetype-2.4.2.tar.gz

          echo "=== 6. xpdf ==="
          wget -q https://dl.xpdfreader.com/old/xpdf-3.01.tar.gz -O xpdf-3.01.tar.gz
          tar -xzf xpdf-3.01.tar.gz && rm xpdf-3.01.tar.gz

      # 4. 내 레포지토리에 실제로 Commit 하고 Push 하기
      - name: Commit and Push to Repository
        run: |
          # Git 사용자 설정 (봇 이름으로 세팅)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경사항(새로 생성된 third_party 내부 폴더들) 감지하여 스테이징
          git add third_party/
          
          # 새로 추가된 내역이 있을 때만 커밋 및 푸시 실행 (무한 루프 방지)
          if ! git diff --cached --quiet; then
            git commit -m "docs: add downloaded third-party sources to repository"
            git push origin main
            echo "Changes pushed successfully!"
          else
            echo "No changes to commit."
          fi
