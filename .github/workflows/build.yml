name: Build third_party libs (MSVC 12.0 / v120 toolset)

# =============================================================================
# third_party 내 6개 라이브러리를 MSVC 12.0 (Visual Studio 2013, v120 toolset)으로
# 빌드해 .lib 로 산출한다.
#
# 💡 [해결책] Chocolatey를 통한 구형 VS2013 전체 설치 대신, 호스팅 러너에 
#    이미 설치된 VS 2022 Enterprise Installer를 통해 MSVC v120 빌드 도구 구성 요소만
#    빠르게 추가 설치하여 빌드 환경을 구축합니다.
# =============================================================================

on:
  push:
    branches: [ "main" ]
    paths:
      - "third_party/**"
      - ".github/workflows/build-msvc120-libs.yml"
  workflow_dispatch:

env:
  # VS 2022 내부의 v120(VS 2013)용 vcvarsall.bat 경로 지정
  VCVARSALL: C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat
  CFLAGS_COMMON: /nologo /c /O2 /Zi /GL /EHsc /D "WIN32" /D "_CRT_SECURE_NO_WARNINGS" /D "_CRT_NONSTDC_NO_DEPRECATE"
  LIBFLAGS_COMMON: /nologo /LTCG /MACHINE:X86

jobs:
  # ---------------------------------------------------------------------------
  # 1) zlib / openjpeg / tiff / freetype / xpdf 빌드
  # ---------------------------------------------------------------------------
  build-libs:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # 절대 경로를 사용하여 VS Installer를 직접 실행합니다.
      # component id: Microsoft.VisualStudio.Component.VC.120
      # -------------------------------------------------------------------
      - name: Install MSVC v120 (VS2013) Toolset via VS Installer
        run: |
          echo "Installing MSVC v120 toolset..."
          "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify ^
            --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" ^
            --add Microsoft.VisualStudio.Component.VC.120 ^
            --passive --norestart
          if errorlevel 1 (
            echo [WARNING] VS Installer finished with non-zero exit code. Proceeding to verification...
          )
          
      - name: Verify VS2013 (v120) toolset is available
        run: |
          if not exist "%VCVARSALL%" (
            echo [FATAL] "%VCVARSALL%" not found.
            echo MSVC v120 (VS 2013) toolset installation failed.
            exit /b 1
          )
          echo Found vcvarsall.bat at "%VCVARSALL%"

      # -------------------------------------------------------------------
      # zlib 1.2.1
      # -------------------------------------------------------------------
      - name: Build zlib-1.2.1
        working-directory: third_party/zlib-1.2.1
        run: |
          call "%VCVARSALL%" x86 -vcvars_ver=12.0
          if not exist build mkdir build
          cd build
          cl %CFLAGS_COMMON% ^
            ..\adler32.c ..\compress.c ..\crc32.c ..\deflate.c ..\gzio.c ^
            ..\infback.c ..\inffast.c ..\inflate.c ..\inftrees.c ..\trees.c ^
            ..\uncompr.c ..\zutil.c
          if errorlevel 1 exit /b 1
          lib %LIBFLAGS_COMMON% /OUT:zlib-1.2.1.lib *.obj
          if errorlevel 1 exit /b 1

      # -------------------------------------------------------------------
      # openjpeg-version.1.5.2
      # -------------------------------------------------------------------
      - name: Generate opj_config.h
        working-directory: third_party/openjpeg-version.1.5.2/libopenjpeg
        run: |
          (
            echo /* generated for MSVC 12.0 build - no CMake available */
            echo #define PACKAGE_VERSION "1.5.2"
          ) > opj_config.h

      - name: Build openjpeg-version.1.5.2
        working-directory: third_party/openjpeg-version.1.5.2/libopenjpeg
        run: |
          call "%VCVARSALL%" x86 -vcvars_ver=12.0
          if not exist build mkdir build
          cd build
          cl %CFLAGS_COMMON% /I.. ^
            ..\bio.c ..\cidx_manager.c ..\cio.c ..\dwt.c ..\event.c ^
            ..\image.c ..\j2k.c ..\j2k_lib.c ..\jp2.c ..\jpt.c ..\mct.c ^
            ..\mqc.c ..\openjpeg.c ..\phix_manager.c ..\pi.c ^
            ..\ppix_manager.c ..\raw.c ..\t1.c ..\t2.c ..\tcd.c ..\tgt.c ^
            ..\thix_manager.c ..\tpix_manager.c
          if errorlevel 1 exit /b 1
          lib %LIBFLAGS_COMMON% /OUT:openjpeg-1.5.2.lib *.obj
          if errorlevel 1 exit /b 1

      # -------------------------------------------------------------------
      # tiff-v3.4
      # -------------------------------------------------------------------
      - name: Build tiff-v3.4
        working-directory: third_party/tiff-v3.4/libtiff
        run: |
          call "%VCVARSALL%" x86 -vcvars_ver=12.0
          if not exist build mkdir build
          cd build
          cl %CFLAGS_COMMON% /I.. /I..\..\..\zlib-1.2.1 ^
            ..\tif_aux.c ..\tif_close.c ..\tif_codec.c ..\tif_compress.c ^
            ..\tif_dir.c ..\tif_dirinfo.c ..\tif_dirread.c ..\tif_dirwrite.c ^
            ..\tif_dumpmode.c ..\tif_error.c ..\tif_fax3.c ..\tif_flush.c ^
            ..\tif_getimage.c ..\tif_lzw.c ..\tif_next.c ..\tif_open.c ^
            ..\tif_packbits.c ..\tif_pixarlog.c ..\tif_predict.c ..\tif_print.c ^
            ..\tif_read.c ..\tif_strip.c ..\tif_swab.c ..\tif_thunder.c ^
            ..\tif_tile.c ..\tif_version.c ..\tif_warning.c ..\tif_win32.c ^
            ..\tif_write.c ..\tif_zip.c
          if errorlevel 1 exit /b 1
          lib %LIBFLAGS_COMMON% /OUT:tiff-v3.4.lib *.obj
          if errorlevel 1 exit /b 1

      # -------------------------------------------------------------------
      # freetype-2.4.2
      # -------------------------------------------------------------------
      - name: Build freetype-2.4.2
        working-directory: third_party/freetype-2.4.2
        run: |
          call "%VCVARSALL%" x86 -vcvars_ver=12.0
          if not exist build mkdir build
          cd build
          cl %CFLAGS_COMMON% /D "FT2_BUILD_LIBRARY" ^
            /I..\include /I..\builds\win32 ^
            ..\src\autofit\autofit.c ^
            ..\src\bdf\bdf.c ^
            ..\src\cff\cff.c ^
            ..\src\base\ftbase.c ^
            ..\src\base\ftbbox.c ^
            ..\src\base\ftbdf.c ^
            ..\src\base\ftbitmap.c ^
            ..\src\base\ftfstype.c ^
            ..\src\base\ftgasp.c ^
            ..\src\cache\ftcache.c ^
            ..\builds\win32\ftdebug.c ^
            ..\src\base\ftglyph.c ^
            ..\src\base\ftgxval.c ^
            ..\src\gzip\ftgzip.c ^
            ..\src\base\ftinit.c ^
            ..\src\lzw\ftlzw.c ^
            ..\src\base\ftmm.c ^
            ..\src\base\ftotval.c ^
            ..\src\base\ftpfr.c ^
            ..\src\base\ftstroke.c ^
            ..\src\base\ftsynth.c ^
            ..\src\base\ftsystem.c ^
            ..\src\base\fttype1.c ^
            ..\src\base\ftwinfnt.c ^
            ..\src\base\ftxf86.c ^
            ..\src\pcf\pcf.c ^
            ..\src\pfr\pfr.c ^
            ..\src\psaux\psaux.c ^
            ..\src\pshinter\pshinter.c ^
            ..\src\psnames\psmodule.c ^
            ..\src\raster\raster.c ^
            ..\src\sfnt\sfnt.c ^
            ..\src\smooth\smooth.c ^
            ..\src\truetype\truetype.c ^
            ..\src\type1\type1.c ^
            ..\src\cid\type1cid.c ^
            ..\src\type42\type42.c ^
            ..\src\winfonts\winfnt.c
          if errorlevel 1 exit /b 1
          lib %LIBFLAGS_COMMON% /OUT:freetype-2.4.2.lib *.obj
          if errorlevel 1 exit /b 1

      # -------------------------------------------------------------------
      # xpdf-3.01
      # -------------------------------------------------------------------
      - name: Prepare xpdf win32 config
        working-directory: third_party/xpdf-3.01
        run: |
          copy /Y aconf-win32.h aconf.h

      - name: Build xpdf-3.01
        working-directory: third_party/xpdf-3.01
        run: |
          call "%VCVARSALL%" x86 -vcvars_ver=12.0
          if not exist build mkdir build
          cd build
          cl %CFLAGS_COMMON% ^
            /I.. /I..\goo /I..\fofi /I..\splash /I..\xpdf ^
            /I..\..\freetype-2.4.2\include ^
            ..\goo\FixedPoint.cc ..\goo\GHash.cc ..\goo\GList.cc ^
            ..\goo\GString.cc ..\goo\gfile.cc ..\goo\gmem.c ..\goo\gmempp.cc ^
            ..\goo\parseargs.c ^
            ..\fofi\FoFiBase.cc ..\fofi\FoFiEncodings.cc ..\fofi\FoFiTrueType.cc ^
            ..\fofi\FoFiType1.cc ..\fofi\FoFiType1C.cc ^
            ..\splash\Splash.cc ..\splash\SplashBitmap.cc ..\splash\SplashClip.cc ^
            ..\splash\SplashFTFont.cc ..\splash\SplashFTFontEngine.cc ^
            ..\splash\SplashFTFontFile.cc ..\splash\SplashFont.cc ^
            ..\splash\SplashFontEngine.cc ..\splash\SplashFontFile.cc ^
            ..\splash\SplashFontFileID.cc ..\splash\SplashPath.cc ^
            ..\splash\SplashPattern.cc ..\splash\SplashScreen.cc ^
            ..\splash\SplashState.cc ..\splash\SplashT1Font.cc ^
            ..\splash\SplashT1FontEngine.cc ..\splash\SplashT1FontFile.cc ^
            ..\splash\SplashXPath.cc ..\splash\SplashXPathScanner.cc ^
            ..\xpdf\Annot.cc ..\xpdf\Array.cc ..\xpdf\BuiltinFont.cc ^
            ..\xpdf\BuiltinFontTables.cc ..\xpdf\Catalog.cc ..\xpdf\CharCodeToUnicode.cc ^
            ..\xpdf\CMap.cc ..\xpdf\Decrypt.cc ..\xpdf\Dict.cc ..\xpdf\Error.cc ^
            ..\xpdf\FontEncodingTables.cc ..\xpdf\Function.cc ..\xpdf\Gfx.cc ^
            ..\xpdf\GfxFont.cc ..\xpdf\GfxState.cc ..\xpdf\GlobalParams.cc ^
            ..\xpdf\JArithmeticDecoder.cc ..\xpdf\JBIG2Stream.cc ..\xpdf\Lexer.cc ^
            ..\xpdf\Link.cc ..\xpdf\NameToCharCode.cc ..\xpdf\Object.cc ^
            ..\xpdf\OutputDev.cc ..\xpdf\Page.cc ..\xpdf\Parser.cc ^
            ..\xpdf\PDFDoc.cc ..\xpdf\PDFDocEncoding.cc ..\xpdf\PSTokenizer.cc ^
            ..\xpdf\SecurityHandler.cc ..\xpdf\Stream.cc ..\xpdf\TextOutputDev.cc ^
            ..\xpdf\UnicodeMap.cc ..\xpdf\UnicodeTypeTable.cc ..\xpdf\XRef.cc ^
            ..\xpdf\XpdfPluginAPI.cc ..\xpdf\PageLabelInfo.cc ..\xpdf\PSOutputDev.cc
          if errorlevel 1 exit /b 1
          lib %LIBFLAGS_COMMON% /OUT:xpdf-3.01.lib *.obj
          if errorlevel 1 exit /b 1

      - name: Collect .lib artifacts
        run: |
          if not exist artifacts mkdir artifacts
          copy /Y third_party\zlib-1.2.1\build\zlib-1.2.1.lib artifacts\
          copy /Y third_party\openjpeg-version.1.5.2\libopenjpeg\build\openjpeg-1.5.2.lib artifacts\
          copy /Y third_party\tiff-v3.4\libtiff\build\tiff-v3.4.lib artifacts\
          copy /Y third_party\freetype-2.4.2\build\freetype-2.4.2.lib artifacts\
          copy /Y third_party\xpdf-3.01\build\xpdf-3.01.lib artifacts\

      - name: Upload .lib artifacts
        uses: actions/upload-artifact@v4
        with:
          name: third-party-libs-msvc120-x86
          path: artifacts/*.lib
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2) js-1.8.5 (SpiderMonkey) 빌드
  # ---------------------------------------------------------------------------
  build-js185-spidermonkey:
    runs-on: windows-latest
    needs: build-libs
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # 절대 경로를 사용하여 VS Installer를 직접 실행합니다.
      # component id: Microsoft.VisualStudio.Component.VC.120
      # -------------------------------------------------------------------
      - name: Install MSVC v120 (VS2013) Toolset via VS Installer
        run: |
          echo "Installing MSVC v120 toolset..."
          "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify ^
            --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" ^
            --add Microsoft.VisualStudio.Component.VC.120 ^
            --passive --norestart
          if errorlevel 1 (
            echo [WARNING] VS Installer finished with non-zero exit code. Proceeding to verification...
          )


      - name: Verify VS2013 toolset is available
        run: |
          if not exist "%VCVARSALL%" (
            echo [FATAL] "%VCVARSALL%" not found.
            exit /b 1
          )

      - name: Install MozillaBuild
        continue-on-error: true
        run: |
          choco install mozillabuild -y --no-progress

      - name: Verify MozillaBuild is available
        id: check_mozillabuild
        run: |
          if not exist "C:\mozilla-build\start-shell.bat" (
            echo [WARN] MozillaBuild not found - js-1.8.5 build will be skipped.
            echo skip=true>> %GITHUB_OUTPUT%
          ) else (
            echo skip=false>> %GITHUB_OUTPUT%
          )

      - name: Configure & build SpiderMonkey (best effort)
        if: steps.check_mozillabuild.outputs.skip != 'true'
        working-directory: third_party/js-1.8.5/js/src
        continue-on-error: true
        run: |
          call "%VCVARSALL%" x86 -vcvars_ver=12.0
          set MOZ_TOOLS=C:\mozilla-build
          "C:\mozilla-build\start-shell.bat" -c "cd js/src && ./configure --enable-optimize --disable-debug --target=i686-pc-mingw32 --with-macos-sdk=no && make"

      - name: Archive SpiderMonkey static lib (if produced)
        if: steps.check_mozillabuild.outputs.skip != 'true'
        continue-on-error: true
        run: |
          if not exist artifacts mkdir artifacts
          for /r third_party\js-1.8.5\js\src %%f in (*.lib) do copy /Y "%%f" artifacts\ 2>nul
          echo Done (best effort - check artifacts\ for a produced js185.lib)

      - name: Upload SpiderMonkey artifact (if any)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: js185-spidermonkey-msvc120-x86
          path: artifacts/*.lib
          if-no-files-found: warn
